<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLAXHO | Elite Scripts & Premium Power</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-black: #050505;
            --gold-primary: #D4AF37;
            --gold-light: #F9E498;
            --gold-dark: #B38B2F;
            --glass: rgba(255, 255, 255, 0.04);
            --border-gold: rgba(212, 175, 55, 0.25);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-black); color: white; overflow-x: hidden; }

        /* === LOADING SCREEN === */
        #loader {
            position: fixed;
            inset: 0;
            background: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 1.2s ease;
        }
        .loader-content {
            text-align: center;
        }
        .loader-logo {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 12px;
            color: var(--gold-primary);
            margin-bottom: 30px;
            animation: glowPulse 2s infinite alternate;
        }
        .loader-bar {
            width: 280px;
            height: 2px;
            background: #222;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }
        .loader-bar::after {
            content: '';
            position: absolute;
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
            animation: loadingBar 1.8s infinite linear;
        }
        @keyframes glowPulse { from { text-shadow: 0 0 20px #D4AF37; } to { text-shadow: 0 0 50px #F9E498; } }
        @keyframes loadingBar { 0% { transform: translateX(-100%); } 100% { transform: translateX(400%); } }

        /* Mouse Glow */
        .mouse-glow {
            position: fixed;
            width: 420px;
            height: 420px;
            background: radial-gradient(circle, rgba(212,175,55,0.18) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
            mix-blend-mode: screen;
            display: none;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: linear-gradient(to bottom, rgba(5,5,5,0.95), transparent);
            backdrop-filter: blur(12px);
        }
        .logo { font-weight: 900; font-size: 2rem; letter-spacing: 6px; color: var(--gold-primary); text-shadow: 0 0 25px rgba(212,175,55,0.6); }
        .nav-links { display: flex; gap: 35px; align-items: center; }
        .nav-links a {
            color: #ddd; text-decoration: none; text-transform: uppercase; font-size: 0.85rem;
            letter-spacing: 1.5px; transition: var(--transition);
        }
        .nav-links a:hover { color: var(--gold-light); text-shadow: 0 0 15px var(--gold-primary); }
        .hamburger { display: none; font-size: 1.8rem; cursor: pointer; color: var(--gold-primary); }

        /* Hero */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(212,175,55,0.08) 0%, transparent 60%);
            z-index: 1;
        }
        .hero h1 {
            font-size: clamp(4.5rem, 12vw, 9rem);
            font-weight: 900;
            letter-spacing: -4px;
            background: linear-gradient(180deg, #fff 40%, var(--gold-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 40px rgba(212,175,55,0.5));
            z-index: 2;
        }
        .hero p {
            font-size: 1.6rem;
            color: #ccc;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin: 20px 0 50px;
            z-index: 2;
        }

        .btn {
            padding: 18px 48px;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: var(--transition);
            cursor: pointer;
        }
        .btn-primary {
            background: var(--gold-primary);
            color: #111;
            box-shadow: 0 0 30px rgba(212,175,55,0.5);
        }
        .btn-primary:hover { transform: translateY(-4px); box-shadow: 0 15px 40px rgba(212,175,55,0.7); }

        /* Sections */
        section { padding: 120px 10%; position: relative; z-index: 2; }
        .section-title { text-align: center; margin-bottom: 70px; }
        .section-title h2 {
            font-size: 2.8rem;
            color: var(--gold-primary);
        }
        .section-title div {
            width: 70px;
            height: 3px;
            background: linear-gradient(to right, transparent, var(--gold-primary), transparent);
            margin: 15px auto 0;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }
        .card {
            background: var(--glass);
            border: 1px solid var(--border-gold);
            padding: 45px 30px;
            border-radius: 12px;
            text-align: center;
            transition: var(--transition);
            backdrop-filter: blur(12px);
        }
        .card:hover {
            transform: translateY(-15px) rotateX(8deg) rotateY(8deg);
            border-color: var(--gold-primary);
            box-shadow: 0 30px 60px rgba(212,175,55,0.2);
        }

        /* Pricing */
        .price-card {
            background: linear-gradient(145deg, #111, #050505);
            padding: 55px 35px;
            border: 1px solid var(--border-gold);
            border-radius: 12px;
            height: 100%;
            position: relative;
            transition: var(--transition);
        }
        .price-card.featured {
            border: 3px solid var(--gold-primary);
            transform: scale(1.06);
            box-shadow: 0 0 70px rgba(212,175,55,0.3);
        }
        .badge {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold-primary);
            color: #111;
            padding: 6px 22px;
            font-size: 0.75rem;
            font-weight: 900;
            border-radius: 30px;
        }

        /* Checkout Modal */
        #checkoutModal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        .modal-content {
            background: #0a0a0a;
            border: 2px solid var(--gold-primary);
            width: 90%;
            max-width: 460px;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hamburger { display: block; }
        }
    </style>
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="loader">
        <div class="loader-content">
            <div class="loader-logo">HLAXHO</div>
            <div class="loader-bar"></div>
            <p style="margin-top: 25px; color: #aaa; letter-spacing: 3px; font-size: 0.9rem;">INITIALIZING ELITE ACCESS...</p>
        </div>
    </div>

    <!-- Mouse Glow -->
    <div class="mouse-glow" id="mouseGlow"></div>

    <nav>
        <div class="logo">HLAXHO</div>
        <div class="nav-links" id="navLinks">
            <a href="#about">Sobre</a>
            <a href="#scripts">Scripts</a>
            <a href="#pricing">Premium</a>
            <a href="#showcase">Ventajas</a>
            <a href="https://discord.gg/hlaxho" target="_blank"><i class="fab fa-discord"></i></a>
        </div>
        <div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div>
    </nav>

    <!-- HERO -->
    <header class="hero" id="home">
        <div id="particles-js"></div>
        <h1 data-aos="zoom-out" data-aos-duration="1400">HLAXHO</h1>
        <p data-aos="fade-up" data-aos-delay="500">Elite Scripts. Premium Power.</p>
        <div data-aos="fade-up" data-aos-delay="800">
            <button onclick="showCheckout()" class="btn btn-primary" style="font-size:1.1rem;">GET PREMIUM ACCESS</button>
        </div>
    </header>

    <!-- Resto de secciones (mismo contenido que v2.0, solo actualizo Pricing con botón mejorado) -->
    <section id="about"> ... (mismo que antes) </section>
    <section id="scripts" style="background: rgba(212,175,55,0.015);"> ... </section>

    <section id="pricing">
        <div class="section-title" data-aos="fade-up"><h2>Elige tu Nivel de Poder</h2><div></div></div>
        <div class="grid">
            <div class="price-card card" data-aos="zoom-in"><h3>VIP</h3><div class="price">$19.99</div><ul><!-- items --></ul><button onclick="showCheckout()" class="btn btn-secondary">Seleccionar</button></div>
            
            <div class="price-card card featured" data-aos="zoom-in" data-aos-delay="200">
                <div class="badge">MÁS POPULAR</div>
                <h3>VIP PLUS</h3>
                <div class="price">$39.99</div>
                <ul><!-- items --></ul>
                <button onclick="showCheckout()" class="btn btn-primary">Seleccionar</button>
            </div>
            
            <div class="price-card card" data-aos="zoom-in" data-aos-delay="300"><h3>SUPER VIP</h3><div class="price">$89.99</div><ul><!-- items --></ul><button onclick="showCheckout()" class="btn btn-secondary">Seleccionar</button></div>
        </div>
    </section>

    <!-- SHOWCASE y CTA igual que antes -->

    <!-- CHECKOUT MODAL -->
    <div id="checkoutModal">
        <div class="modal-content">
            <h2 style="color:var(--gold-primary); margin-bottom:10px;">CHECKOUT SECURE</h2>
            <p id="selectedPlan" style="margin-bottom:30px; color:#aaa;"></p>
            
            <div style="text-align:left; margin:25px 0;">
                <label style="display:block; margin:15px 0 8px; color:#ccc;">Nombre completo</label>
                <input type="text" value="Alex Rivera" style="width:100%; padding:14px; background:#111; border:1px solid var(--border-gold); color:white; border-radius:6px;">
                
                <label style="display:block; margin:15px 0 8px; color:#ccc;">Correo electrónico</label>
                <input type="email" value="tu@email.com" style="width:100%; padding:14px; background:#111; border:1px solid var(--border-gold); color:white; border-radius:6px;">
            </div>
            
            <button onclick="completePurchase()" style="width:100%; padding:18px; background:var(--gold-primary); color:#111; border:none; font-weight:900; margin-top:20px; border-radius:6px;">
                PAGAR $39.99 • ACCESO INSTANTÁNEO
            </button>
            <p onclick="closeModal()" style="margin-top:20px; color:#777; cursor:pointer;">Cancelar</p>
        </div>
    </div>

    <!-- FOOTER -->
    <footer> ... (mismo que antes) </footer>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // Loading Screen
        window.addEventListener('load', () => {
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 1200);
            }, 1800);
        });

        AOS.init({ duration: 1000, once: true });

        // Particles (igual que antes)
        particlesJS("particles-js", { /* misma config que v2.0 */ });

        // Mouse Glow
        const mouseGlow = document.getElementById('mouseGlow');
        document.addEventListener('mousemove', (e) => {
            mouseGlow.style.display = 'block';
            mouseGlow.style.left = (e.clientX - 210) + 'px';
            mouseGlow.style.top = (e.clientY - 210) + 'px';
        });

        // Hamburger
        document.getElementById('hamburger').addEventListener('click', () => {
            const links = document.getElementById('navLinks');
            links.style.display = links.style.display === 'flex' ? 'none' : 'flex';
        });

        // Checkout Modal
        let currentPlan = '';
        function showCheckout(plan = 'VIP PLUS') {
            currentPlan = plan;
            document.getElementById('selectedPlan').textContent = `Plan seleccionado: ${plan} • $39.99`;
            document.getElementById('checkoutModal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('checkoutModal').style.display = 'none';
        }
        function completePurchase() {
            alert('✅ ¡Compra exitosa! Bienvenido a HLAXHO Elite.\n\nTus credenciales han sido enviadas a tu correo.');
            closeModal();
        }

        console.log('%cHLAXHO v3.0 — Nivel 200x cargado. Listo para dominar.', 'color:#D4AF37; font-size:14px; font-weight:900;');
    </script>
</body>
</html>
